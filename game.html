<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Object - Drawing Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 20px;
            background: #fafafa;
            min-height: 300px;
        }

        #canvas {
            border: none;
            background: white;
            display: block;
            touch-action: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .color-pencil-section {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 12px;
        }

        .color-picker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .color-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #ccc;
            cursor: pointer;
            background: #000;
            transition: transform 0.2s;
        }

        .color-circle:hover {
            transform: scale(1.05);
        }

        #colorInput {
            display: none;
        }

        .color-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        .pencil-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pencil-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        .pencil-sizes {
            display: flex;
            gap: 8px;
        }

        .pencil-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pencil-btn.small {
            width: 24px;
            height: 24px;
        }

        .pencil-btn.medium {
            width: 32px;
            height: 32px;
        }

        .pencil-btn.large {
            width: 40px;
            height: 40px;
        }

        .pencil-dot {
            border-radius: 50%;
            background: #000;
        }

        .pencil-btn.active {
            border-color: #333;
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333;
        }

        /* Brush Type Section */
        .brush-type-section {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
        }

        .brush-type-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .brush-types {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .brush-btn {
            padding: 8px 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }

        .brush-btn:hover {
            border-color: #333;
        }

        .brush-btn.active {
            background: #333;
            color: white;
            border-color: #333;
        }

        .settings-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .settings-group.full {
            grid-template-columns: 1fr;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        input[type="number"] {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #333;
        }

        .border-radius-section {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
        }

        .border-radius-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .button-section {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #333;
            color: white;
        }

        .btn-primary:hover {
            background: #000;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .preview-info {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Profil Object</h1>
        
        <div class="canvas-wrapper">
            <canvas id="canvas" width="300" height="200"></canvas>
        </div>

        <div class="controls">
            <div class="color-pencil-section">
                <div class="color-picker-wrapper">
                    <div class="color-circle" id="colorCircle"></div>
                    <div class="color-label">Color</div>
                    <input type="color" id="colorInput" value="#000000">
                </div>

                <div class="pencil-section">
                    <div class="pencil-label">Size</div>
                    <div class="pencil-sizes">
                        <button class="pencil-btn small active" data-size="2">
                            <div class="pencil-dot" style="width: 2px; height: 2px;"></div>
                        </button>
                        <button class="pencil-btn medium" data-size="5">
                            <div class="pencil-dot" style="width: 5px; height: 5px;"></div>
                        </button>
                        <button class="pencil-btn large" data-size="10">
                            <div class="pencil-dot" style="width: 10px; height: 10px;"></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Brush Type Section -->
            <div class="brush-type-section">
                <div class="brush-type-label">Brush Type</div>
                <div class="brush-types">
                    <button class="brush-btn active" data-brush="pencil">Pencil</button>
                    <button class="brush-btn" data-brush="circle">Circle</button>
                    <button class="brush-btn" data-brush="spray">Spray</button>
                    <button class="brush-btn" data-brush="halo">Halo</button>
                </div>
            </div>

            <div class="settings-group full">
                <div class="input-group">
                    <label class="input-label">Rotation (°)</label>
                    <input type="number" id="rotation" value="0" min="0" max="360">
                </div>
            </div>

            <div class="settings-group">
                <div class="input-group">
                    <label class="input-label">Width (px)</label>
                    <input type="number" id="width" value="300" min="50" max="600">
                </div>
                <div class="input-group">
                    <label class="input-label">Height (px)</label>
                    <input type="number" id="height" value="200" min="50" max="600">
                </div>
            </div>

            <div class="border-radius-section">
                <div class="input-label" style="margin-bottom: 8px;">Border Radius (%)</div>
                <div class="border-radius-grid">
                    <div class="input-group">
                        <label class="input-label" style="font-size: 11px;">Left</label>
                        <input type="number" id="radiusLeft" value="0" min="0" max="50">
                    </div>
                    <div class="input-group">
                        <label class="input-label" style="font-size: 11px;">Right</label>
                        <input type="number" id="radiusRight" value="0" min="0" max="50">
                    </div>
                    <div class="input-group">
                        <label class="input-label" style="font-size: 11px;">Top</label>
                        <input type="number" id="radiusTop" value="0" min="0" max="50">
                    </div>
                    <div class="input-group">
                        <label class="input-label" style="font-size: 11px;">Bottom</label>
                        <input type="number" id="radiusBottom" value="0" min="0" max="50">
                    </div>
                </div>
            </div>

            <div class="button-section">
                <button class="btn btn-secondary" id="clearBtn">Clear</button>
                <button class="btn btn-primary" id="downloadBtn">Download</button>
            </div>

            <div class="preview-info">💡 Zeichne mit der Maus oder dem Stift</div>
        </div>
    </div>

    <script>
        // Initialize Fabric.js canvas
        const canvas = new fabric.Canvas('canvas', {
            isDrawingMode: true,
            backgroundColor: 'white'
        });

        const colorCircle = document.getElementById('colorCircle');
        const colorInput = document.getElementById('colorInput');
        const rotationInput = document.getElementById('rotation');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const radiusLeftInput = document.getElementById('radiusLeft');
        const radiusRightInput = document.getElementById('radiusRight');
        const radiusTopInput = document.getElementById('radiusTop');
        const radiusBottomInput = document.getElementById('radiusBottom');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const canvasElement = document.getElementById('canvas');

        let currentColor = '#000000';
        let currentSize = 2;
        let currentBrush = 'pencil';

        // Initialize
        colorCircle.style.backgroundColor = currentColor;
        canvas.freeDrawingBrush.color = currentColor;
        canvas.freeDrawingBrush.width = currentSize;

        // Color Picker
        colorCircle.addEventListener('click', () => {
            colorInput.click();
        });

        colorInput.addEventListener('change', (e) => {
            currentColor = e.target.value;
            colorCircle.style.backgroundColor = currentColor;
            canvas.freeDrawingBrush.color = currentColor;
            canvas.renderAll();
        });

        // Pencil Size Selection
        document.querySelectorAll('.pencil-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.pencil-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSize = parseInt(btn.dataset.size);
                canvas.freeDrawingBrush.width = currentSize;
            });
        });

        // Brush Type Selection
        document.querySelectorAll('.brush-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentBrush = btn.dataset.brush;
                setBrushType(currentBrush);
            });
        });

        function setBrushType(brushType) {
            let brush;

            switch (brushType) {
                case 'pencil':
                    brush = new fabric.PencilBrush(canvas);
                    break;
                case 'circle':
                    brush = new fabric.CircleBrush(canvas);
                    break;
                case 'spray':
                    brush = new fabric.SprayBrush(canvas);
                    break;
                case 'halo':
                    brush = new fabric.SprayBrush(canvas);
                    brush.width = 15;
                    brush.opacity = 0.5;
                    break;
                default:
                    brush = new fabric.PencilBrush(canvas);
            }

            brush.color = currentColor;
            brush.width = currentSize;
            canvas.freeDrawingBrush = brush;
        }

        // Size Controls
        widthInput.addEventListener('change', updateCanvasSize);
        heightInput.addEventListener('change', updateCanvasSize);

        function updateCanvasSize() {
            const newWidth = parseInt(widthInput.value);
            const newHeight = parseInt(heightInput.value);
            
            canvas.setWidth(newWidth);
            canvas.setHeight(newHeight);
            canvasElement.width = newWidth;
            canvasElement.height = newHeight;
        }

        // Rotation
        rotationInput.addEventListener('input', (e) => {
            const rotation = parseInt(e.target.value);
            canvasElement.style.transform = `rotate(${rotation}deg)`;
        });

        // Border Radius
        function updateBorderRadius() {
            const left = parseInt(radiusLeftInput.value);
            const right = parseInt(radiusRightInput.value);
            const top = parseInt(radiusTopInput.value);
            const bottom = parseInt(radiusBottomInput.value);
            
            canvasElement.style.borderRadius = `${top}% ${right}% ${bottom}% ${left}%`;
        }

        radiusLeftInput.addEventListener('input', updateBorderRadius);
        radiusRightInput.addEventListener('input', updateBorderRadius);
        radiusTopInput.addEventListener('input', updateBorderRadius);
        radiusBottomInput.addEventListener('input', updateBorderRadius);

        // Clear Canvas
        clearBtn.addEventListener('click', () => {
            canvas.clear();
        });

        // Download
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'profil-object.png';
            link.click();
        });
    </script>
</body>
</html>
